<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌟 Ewiger Kalender</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>
  <div class="bg-orb orb-4"></div>

  <div class="app-container">

    <header class="glass-header">
      <div class="header-inner">
        <div class="header-title">
          <span class="header-icon">🌟</span>
          <h1>Ewiger Kalender</h1>
          <span class="header-icon">🌟</span>
        </div>
        <p class="header-sub">28 Tage · 52 Wochen · 13 Monate</p>
      </div>
      <nav class="tab-nav">
        <button class="tab-btn active" data-tab="uebersicht">Übersicht</button>
        <button class="tab-btn" data-tab="konverter">Konverter</button>
        <button class="darkmode-toggle" id="darkmode-toggle" title="Dark Mode">
          <span class="toggle-icon">🌙</span>
        </button>
      </nav>
    </header>

    <!-- Tab: Übersicht -->
    <section class="tab-content active" id="tab-uebersicht">

      <div class="today-card glass-card">
        <div class="today-col">
          <span class="today-label">Heute</span>
          <span id="greg-today" class="today-date"></span>
        </div>
        <div class="today-sep">·</div>
        <div class="today-col today-col-right">
          <span class="today-label">Ewiger Kalender</span>
          <span id="ewig-today" class="today-date ewig-date"></span>
        </div>
      </div>

      <div class="year-controls glass-card">
        <button class="glass-btn icon-btn" id="btn-year-prev">‹</button>
        <div class="year-display">
          <span id="year-label">2026</span>
        </div>
        <button class="glass-btn icon-btn" id="btn-year-next">›</button>
      </div>

      <div class="year-grid" id="year-grid"></div>

    </section>

    <!-- Tab: Konverter -->
    <section class="tab-content" id="tab-konverter">
      <div class="converter-wrap">

        <!-- Gregorianisch → Ewig: Jahr/Monat/Tag einzeln -->
        <div class="converter-block glass-card">
          <h2 class="converter-title">Gregorianisch → Ewig</h2>
          <div class="input-group">
            <label>Jahr</label>
            <input type="number" id="greg-year" class="glass-input" placeholder="2026" min="1" max="9999" />
          </div>
          <div class="input-group">
            <label>Monat</label>
            <select id="greg-month" class="glass-input glass-select">
              <option value="">– Monat wählen –</option>
              <option value="1">Januar</option>
              <option value="2">Februar</option>
              <option value="3">März</option>
              <option value="4">April</option>
              <option value="5">Mai</option>
              <option value="6">Juni</option>
              <option value="7">Juli</option>
              <option value="8">August</option>
              <option value="9">September</option>
              <option value="10">Oktober</option>
              <option value="11">November</option>
              <option value="12">Dezember</option>
            </select>
          </div>
          <div class="input-group">
            <label>Tag</label>
            <input type="number" id="greg-day" class="glass-input" placeholder="1–31" min="1" max="31" />
          </div>
          <button class="glass-btn primary" id="btn-greg-to-ewig">Umrechnen →</button>
          <div class="result-box" id="result-greg-to-ewig"></div>
        </div>

        <div class="converter-divider">⟷</div>

        <!-- Ewig → Gregorianisch -->
        <div class="converter-block glass-card">
          <h2 class="converter-title">Ewig → Gregorianisch</h2>
          <div class="input-group">
            <label>Jahr</label>
            <input type="number" id="ewig-year" class="glass-input" placeholder="2026" min="1" max="9999" />
          </div>
          <div class="input-group">
            <label>Monat</label>
            <select id="ewig-month" class="glass-input glass-select">
              <option value="">– Monat wählen –</option>
              <option value="1">1 – Aurora (Morgenröte)</option>
              <option value="2">2 – Floris (Blütezeit)</option>
              <option value="3">3 – Viridia (Grünwerden)</option>
              <option value="4">4 – Solara (Sonnenaufbruch)</option>
              <option value="5">5 – Crescera (Wachstum)</option>
              <option value="6">6 – Luminis (Lichtzeit)</option>
              <option value="7">7 – Aestas (Hochsommer)</option>
              <option value="8">8 – Helion (Sonnenhöhe)</option>
              <option value="9">9 – Fructa (Ernte)</option>
              <option value="10">10 – Aurelia (Goldzeit)</option>
              <option value="11">11 – Ventis (Windzeit)</option>
              <option value="12">12 – Nivara (Schneezeit)</option>
              <option value="13">13 – Noctis (Dunkelzeit)</option>
              <option value="0">Unara / Intera (Zeitloser Tag)</option>
            </select>
          </div>
          <div class="input-group" id="ewig-day-group">
            <label>Tag</label>
            <input type="number" id="ewig-day" class="glass-input" placeholder="1–28" min="1" max="28" />
          </div>
          <button class="glass-btn primary" id="btn-ewig-to-greg">Umrechnen →</button>
          <div class="result-box" id="result-ewig-to-greg"></div>
        </div>

      </div>
    </section>

  </div>

  <!-- Popup (scrollt mit, positioniert via JS) -->
  <div class="popup-overlay" id="popup-overlay">
    <div class="popup-card glass-card" id="popup-card">
      <div id="popup-content"></div>
    </div>
  </div>

  <script src="calendar.js"></script>
</body>
</html>
